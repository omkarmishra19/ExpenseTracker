<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Expense</title>
</head>
<body>

<h2>Add Expense</h2>

<form th:action="@{/expense/save}" th:object="${expense}" method="post">

    <input type="text"
           th:field="*{description}"
           placeholder="Description"/>
    <br><br>

    <select th:field="*{category}">
        <option th:value="PERSONAL">PERSONAL</option>
        <option th:value="SURVIVAL">SURVIVAL</option>
        <option th:value="INVESTMENT">INVESTMENT</option>
    </select>
    <br><br>

    <input type="number"
           step="0.01"
           th:field="*{amount}"
           placeholder="Amount"/>
    <br><br>

    <input type="date"
           th:field="*{expenseDate}"/>
    <br><br>

    <button type="submit">Save Expense</button>

</form>

</body>
</html>
